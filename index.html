<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RealityWorld | Operativní Terminál</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --neon-blue: #00f2ff; --neon-gold: #ffd700; --bg-dark: #050505; }
        body { margin: 0; background: var(--bg-dark); color: white; font-family: 'Courier New', monospace; overflow: hidden; }
        
        /* Pozadí s efektem matrixu/sítě */
        .grid-overlay { position: fixed; inset: 0; background-image: linear-gradient(var(--neon-blue) 1px, transparent 1px), linear-gradient(90deg, var(--neon-blue) 1px, transparent 1px); background-size: 50px 50px; opacity: 0.05; pointer-events: none; }

        .terminal-container { height: 100vh; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        
        .header { border-bottom: 2px solid var(--neon-blue); padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .status-light { width: 10px; height: 10px; background: #0f0; border-radius: 50%; box-shadow: 0 0 10px #0f0; display: inline-block; margin-right: 5px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: rgba(0, 242, 255, 0.05); border: 1px solid var(--neon-blue); padding: 15px; border-radius: 8px; }
        .stat-label { font-size: 10px; color: var(--neon-blue); text-transform: uppercase; }
        .stat-value { font-size: 18px; font-weight: bold; margin-top: 5px; color: var(--neon-gold); }

        .action-zone { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
        
        .input-glow { width: 100%; max-width: 400px; background: rgba(0,0,0,0.8); border: 2px solid var(--neon-blue); border-radius: 50px; padding: 15px 25px; box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }
        input { background: transparent; border: none; color: white; width: 100%; font-size: 16px; outline: none; text-align: center; }

        .btn-activate { background: var(--neon-blue); color: black; border: none; padding: 20px 40px; border-radius: 50px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; box-shadow: 0 0 30px var(--neon-blue); }
        .btn-activate:active { transform: scale(0.95); box-shadow: 0 0 10px var(--neon-blue); }

        .log-area { height: 100px; background: rgba(0,0,0,0.5); border: 1px solid #333; padding: 10px; font-size: 10px; overflow-y: auto; color: #888; }
    </style>
</head>
<body>
    <div class="grid-overlay"></div>
    <div class="terminal-container">
        <div class="header">
            <div><span class="status-light"></span> SYSTEM: ONLINE</div>
            <div style="color: var(--neon-gold);">ID: RW-PRO-2026</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Cílová Peněženka</div>
                <div class="stat-value" style="font-size: 10px;">C1Nfhj...u4PaNS</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Stav Sítě</div>
                <div class="stat-value">AKTIVNÍ</div>
            </div>
        </div>

        <div class="action-zone">
            <div class="input-glow">
                <input type="text" id="cmdInput" placeholder="ZADEJTE AUTORIZAČNÍ KÓD...">
            </div>
            <button class="btn-activate" onclick="triggerFlow()">Aktivovat Tok</button>
        </div>

        <div class="log-area" id="log">
            [09:18:01] Inicializace terminálu...<br>
            [09:18:02] Spojení s databází navázáno...<br>
            [09:18:03] Čekám na příkaz...
        </div>
    </div>

    <script>
        function log(msg) {
            const l = document.getElementById('log');
            l.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
            l.scrollTop = l.scrollHeight;
        }

        async function triggerFlow() {
            const cmd = document.getElementById('cmdInput').value;
            log("Odesílám požadavek do API...");
            
            try {
                const res = await fetch('/api/secure-transmit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: "TRIGGER", payload: cmd })
                });
                
                const data = await res.json();
                if (data.success) {
                    log("ÚSPĚCH: Finance nasměrovány na adresu.");
                    log("PENĚŽENKA: " + data.wallet);
                }
            } catch (e) {
                log("CHYBA: API nereaguje. Zkontroluj Vercel.");
            }
        }
    </script>
</body>
</html>
